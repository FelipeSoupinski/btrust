version: '3.8'

services:
  frontend-dev:
    container_name: btrust-dev
    image: node:18-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./:/app:cached
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -lc "npm install --silent && npm run dev -- --host 0.0.0.0"
